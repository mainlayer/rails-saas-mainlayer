name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rails
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rails_saas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://rails:password@localhost/rails_saas_test
      MAINLAYER_API_KEY: ${{ secrets.MAINLAYER_API_KEY }}
      MAINLAYER_PRO_RESOURCE_ID: ${{ secrets.MAINLAYER_PRO_RESOURCE_ID }}
      MAINLAYER_ENTERPRISE_RESOURCE_ID: ${{ secrets.MAINLAYER_ENTERPRISE_RESOURCE_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up database
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load

      - name: Run tests
        run: bundle exec rails test
